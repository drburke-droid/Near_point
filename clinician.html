<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSF Test — Clinician View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy-900: #0a1628;
            --navy-700: #142e54;
            --navy-500: #24508a;
            --cyan-500: #00b8d4;
            --slate-800: #1e293b;
            --slate-600: #475569;
            --slate-400: #94a3b8;
            --gradient-glow: linear-gradient(135deg, #24508a 0%, #00b8d4 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--navy-900);
            color: rgba(255,255,255,0.9);
            min-height: 100vh;
            overflow-y: auto;
        }

        .header {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
        }

        .header h1 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .status-badge {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 100px;
            background: var(--gradient-glow);
            color: white;
        }

        .status-badge.waiting {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .status-badge.complete {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .main {
            max-width: 640px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Current line section */
        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .level-info {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 16px;
        }

        .level-info strong {
            color: white;
        }

        .letters-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        .letter-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .letter-display {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 8px;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1;
            user-select: none;
            position: relative;
        }

        .letter-contrast {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.4);
            font-variant-numeric: tabular-nums;
        }

        .mark-toggle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .mark-toggle:hover {
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
        }

        .mark-toggle.active-wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.6);
            color: #f87171;
        }

        .mark-toggle.active-correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.6);
            color: #34d399;
        }

        .mark-mode-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .mark-mode-row .section-label {
            margin-bottom: 0;
        }

        .btn-mark-mode {
            padding: 5px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
            font-family: inherit;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .btn-mark-mode:hover {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.85);
        }

        .btn-mark-mode.mode-correct {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-next {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            background: var(--gradient-glow);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }

        .btn-next:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 184, 212, 0.3);
        }

        .btn-next:active {
            transform: scale(0.98);
        }

        .btn-next:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-abort {
            padding: 16px 20px;
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-abort:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-glow);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        /* Waiting state */
        .waiting-message {
            text-align: center;
            padding: 60px 24px;
            color: rgba(255,255,255,0.5);
        }

        .waiting-message h2 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
        }

        .hidden { display: none !important; }

        /* Results section */
        .results-section {
            margin-top: 32px;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
            font-size: 0.8rem;
        }

        .results-table th {
            text-align: left;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(255,255,255,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .results-table td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-variant-numeric: tabular-nums;
        }

        .csf-graph-canvas {
            width: 100%;
            height: 320px;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>CSF Test — Clinician</h1>
        <div class="status-badge waiting" id="status-badge">Connecting...</div>
    </div>

    <div class="main">
        <!-- Waiting state -->
        <div id="waiting-panel" class="waiting-message">
            <h2>Waiting for patient display...</h2>
            <p>The CSF test will begin momentarily.</p>
        </div>

        <!-- Active test panel -->
        <div id="test-panel" class="hidden">
            <div class="section-label">Current Line</div>
            <div class="level-info" id="level-info">
                <strong>20/100</strong> — Pass 1, Level 1 of 6
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>

            <div class="letters-grid" id="letters-grid"></div>

            <div class="mark-mode-row">
                <div class="section-label" id="mark-hint">Tap wrong letters</div>
                <button class="btn-mark-mode" id="btn-mark-mode">Mode: Mark Wrong</button>
            </div>

            <div class="controls">
                <button class="btn-next" id="btn-next">Next Line</button>
                <button class="btn-abort" id="btn-abort">Cancel</button>
            </div>
        </div>

        <!-- Results panel -->
        <div id="results-panel" class="hidden">
            <div class="section-label">Test Complete</div>
            <table class="results-table" id="results-table">
                <thead>
                    <tr>
                        <th>Snellen</th>
                        <th>cpd</th>
                        <th>Threshold %</th>
                        <th>Sensitivity</th>
                    </tr>
                </thead>
                <tbody id="results-tbody"></tbody>
            </table>
            <canvas class="csf-graph-canvas" id="csf-graph"></canvas>
        </div>
    </div>

    <script src="clinician.js"></script>
</body>
</html>
